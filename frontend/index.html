<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identificación de Voz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 2rem;
    width: 90%;
    max-width: 600px;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 400;
    color: #888;
    margin-bottom: 2rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .card {
    background: #1a1a2e;
    border-radius: 24px;
    padding: 3rem 2rem;
    transition: all 0.4s ease;
    border: 2px solid #2a2a4a;
    position: relative;
    overflow: hidden;
  }
  .card.unknown {
    border-color: #8b0000;
    box-shadow: 0 0 40px rgba(139, 0, 0, 0.3);
  }
  .card.recognized {
    border-color: #006400;
    box-shadow: 0 0 40px rgba(0, 100, 0, 0.3);
  }
  .status-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    transition: background 0.4s ease;
  }
  .status-dot.unknown { background: #ff4444; }
  .status-dot.recognized { background: #44ff44; }
  .status-dot.waiting { background: #555; }
  #speaker-name {
    font-size: 2.8rem;
    font-weight: 700;
    margin: 1rem 0 0.5rem;
    transition: color 0.4s ease;
  }
  .card.unknown #speaker-name { color: #ff4444; }
  .card.recognized #speaker-name { color: #44ff44; }
  #speaker-id {
    display: inline-block;
    background: #2a2a4a;
    padding: 0.3rem 1rem;
    border-radius: 20px;
    font-size: 0.9rem;
    color: #aaa;
    margin-top: 0.5rem;
    font-family: monospace;
  }
  #timestamp {
    font-size: 0.8rem;
    color: #555;
    margin-top: 1.5rem;
  }
  .waiting-text {
    font-size: 1.5rem;
    color: #555;
    margin: 1rem 0;
  }
  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .footer {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #333;
  }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .badge.unknown { background: #8b0000; color: #ff8888; }
  .badge.recognized { background: #006400; color: #88ff88; }
</style>
</head>
<body>
<div class="container">
  <h1>Sistema de Identificación de Voz</h1>

  <div class="card waiting" id="card">
    <div class="status-dot waiting" id="status-dot"></div>
    <span class="badge" id="badge">Esperando</span>

    <div id="speaker-name" class="pulse">Escuchando...</div>

    <div id="speaker-id">---</div>
    <div id="timestamp"></div>
  </div>

  <div class="footer">Arquitectura Aplicada del Computador</div>
</div>

<script>
const card = document.getElementById('card');
const dot = document.getElementById('status-dot');
const badge = document.getElementById('badge');
const nameEl = document.getElementById('speaker-name');
const idEl = document.getElementById('speaker-id');
const tsEl = document.getElementById('timestamp');

function actualizar(data) {
  const esDesc = data.es_desconocido;
  const id = data.id;
  const nombre = data.nombre;

  card.className = 'card' + (id === 0 ? (data.timestamp === 0 ? ' waiting' : ' unknown') : ' recognized');
  dot.className = 'status-dot' + (id === 0 ? (data.timestamp === 0 ? ' waiting' : ' unknown') : ' recognized');
  badge.className = 'badge' + (id === 0 ? (data.timestamp === 0 ? '' : ' unknown') : ' recognized');
  badge.textContent = id === 0 ? (data.timestamp === 0 ? 'ESPERANDO' : 'DESCONOCIDO') : 'RECONOCIDO';

  nameEl.textContent = nombre;
  nameEl.className = id === 0 ? '' : '';

  idEl.textContent = id === 0 ? '---' : 'ID ' + String(id).padStart(2, '0');

  if (data.timestamp > 0) {
    const d = new Date(data.timestamp * 1000);
    tsEl.textContent = 'Última detección: ' + d.toLocaleTimeString('es-ES');
  } else {
    tsEl.textContent = '';
  }
}

if (!!window.EventSource) {
  const src = new EventSource('/eventos');
  src.onmessage = function(e) {
    const data = JSON.parse(e.data);
    actualizar(data);
  };
  src.onerror = function() {
    nameEl.textContent = 'Reconectando...';
    nameEl.className = 'pulse';
  };
} else {
  nameEl.textContent = 'Tu navegador no soporta SSE';
}
</script>
</body>
</html>
